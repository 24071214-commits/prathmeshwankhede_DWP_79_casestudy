<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipkart UI Clone</title>
<link rel="stylesheet" href="case.css">
</head>

<body>

<!-- Header -->
<div class="header">

    <div class="top-menu">
        <div class="menu-box">Flipkart</div>
        <div class="menu-box">Finance</div>
        <div class="menu-box">Travel</div>
        <div class="menu-box">Grocery</div>
    </div>

    <!-- Location -->
    <div class="location">
        📍 933, Shivaji Nagar Mahal Nagpur
    </div>

    <!-- Search -->
    <div class="search-box">
        <input type="text" placeholder="Search mobiles">
    </div>

    <!-- Categories -->
    <div class="categories">
        <div>For You</div>
        <div>Fashion</div>
        <div>Mobiles</div>
        <div>Beauty</div>
        <div>Electronics</div>
    </div>

</div>

<!-- Banner -->
<div class="banner">
    <div class="banner-text">
        <h2>Men's Shoes</h2>
        <p>From ₹219</p>
    </div>

    <img src="shoes_image.png">
</div>

<!-- Recommendation -->
<div class="recommend">

<h3>Prathmesh, still looking for these?</h3>

<div class="products">

<div class="card">
<img src="Mens_causal_1.png">
<p>Men's Casual</p>
</div>

<div class="card">
<img src="cricket_bag_image.png">
<p>Cricket Bat</p>
</div>

<div class="card">
<img src="waist_bag_image.png">
<p>Waist Bags</p>
</div>

</div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">

<div>🏠 Home</div>
<div>▶ Play</div>
<div>☰ Categories</div>
<div>👤 Account</div>
<div>🛒 Cart</div>

</div>

</body>
</html>
